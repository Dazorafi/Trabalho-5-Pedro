name: CI - Testes Automatizados

on:
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Dar permissão ao Maven Wrapper
        working-directory: ./api
        run: chmod +x mvnw

      - name: Rodar testes do backend
        working-directory: ./api
        run: ./mvnw test

      - name: Instalar dependências do frontend
        working-directory: ./client
        run: npm ci

      - name: Rodar testes do frontend
        working-directory: ./client
        run: npm test

      - name: Instalar dependências do Playwright
        working-directory: ./tests
        run: npm ci

      - name: Instalar navegador do Playwright
        working-directory: ./tests
        run: npx playwright install --with-deps chromium

      - name: Subir API em modo E2E
        working-directory: ./api
        run: nohup ./mvnw spring-boot:run -Dspring-boot.run.profiles=e2e > api.log 2>&1 &

      - name: Subir frontend
        working-directory: ./client
        run: nohup npm run dev > client.log 2>&1 &

      - name: Aguardar API e frontend
        run: |
          for i in {1..60}; do
            curl -s http://localhost:8080 > /dev/null && curl -s http://localhost:3000 > /dev/null && exit 0
            echo "Aguardando serviços iniciarem..."
            sleep 2
          done
          echo "Serviços não iniciaram a tempo"
          exit 1

      - name: Rodar testes Playwright
        working-directory: ./tests
        run: npx playwright test --project=chromium